<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .box {
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      max-width:600px;
      width:100%;
      text-align:center;
    }
    h1{ color:#333; margin-bottom:10px; }
    p{ color:#666; font-size:14px; margin-bottom:18px; }
    a{ color:#667eea; font-weight:800; text-decoration:none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Access denied</h1>
    <p>You are not allowed to approve/reject leave requests.</p>
    <a href="{% url 'profile' %}">Back to profile</a>
  </div>
</body>
</html>
