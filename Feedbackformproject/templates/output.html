<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Submitted</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 20px;
        }

        .container{
            width: 100%;
            max-width: 500px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .container h1{
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 32px;
        }

        .details{
            text-align: left;
            margin-top: 20px;
        }

        .details h2{
            background: #f1f5f9;
            padding: 14px 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-size: 18px;
            color: #334155;
            word-wrap: break-word;
            transition: 0.3s;
        }

        .details h2:hover{
            background: #e2e8f0;
            transform: scale(1.02);
        }

        .label{
            color: #0f172a;
            font-weight: bold;
        }

        @keyframes fadeIn{
            from{
                opacity: 0;
                transform: translateY(20px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width: 600px){
            .container{
                padding: 30px 20px;
            }

            .container h1{
                font-size: 26px;
            }

            .details h2{
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Thank You for Your Feedback!</h1>

        <div class="details">
            <h2><span class="label">Name:</span> {{name}}</h2>
            <h2><span class="label">Roll No:</span> {{rollno}}</h2>
            <h2><span class="label">Email:</span> {{email}}</h2>
            <h2><span class="label">Feedback:</span> {{feedback}}</h2>
        </div>
    </div>

</body>
</html>
