<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root { color-scheme: light; font-family: Arial, sans-serif; }
        body { margin: 0; background: linear-gradient(135deg, #eff6ff, #f8fafc); color: #0f172a; }
        .page { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card { width: 100%; max-width: 760px; background: rgba(255,255,255,0.95); border: 1px solid #dbe4f0; border-radius: 18px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); padding: 24px; }
        h1 { margin-top: 0; font-size: 1.8rem; }
        .muted { color: #475569; margin-bottom: 18px; }
        form { display: grid; gap: 12px; }
        form p { margin: 0; display: grid; gap: 6px; }
        form label { font-weight: 700; color: #1e293b; }
        form input, form select, form textarea { border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px 12px; font-size: 14px; background: white; }
        form input:focus, form select:focus, form textarea:focus { outline: 2px solid #93c5fd; border-color: #60a5fa; }
        .actions { display: flex; gap: 10px; margin-top: 6px; }
        .btn { border: none; border-radius: 10px; padding: 10px 14px; text-decoration: none; font-weight: 700; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff; }
        .btn-secondary { background: #e2e8f0; color: #0f172a; }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>{{ title }}</h1>
            <p class="muted">Fill in the employee details below and save the record.</p>
            <form method="post" action="{% if employee %}{% url 'update' employee.id %}{% else %}{% url 'insert' %}{% endif %}">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="actions">
                    <button class="btn btn-primary" type="submit">{{ submit_text }}</button>
                    <a class="btn btn-secondary" href="{% url 'home' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
